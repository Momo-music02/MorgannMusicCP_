    <meta property="og:image" content="3.png">
    <meta property="og:description" content="Morgann Music CP, distribuez votre musique partout.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0V4LLanw2qksYuMGFYw5U/yKzI5ZqD5v/e10z1x6+3Rz4m0S9K0P8v6C5w==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16 .png">
    <link rel="icon" type="image/ico" sizes="48x48" href="/favicon .ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="style-login.css">
</head>
<body>

    <header class="navbar" id="navbar">
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="Mon Logo" class="logo" id="logo-dynamique">
                </a>
            </div>
            <button class="menu-toggle" id="menu-toggle">☰</button>
            <ul id="nav-links">
                <li><a href="index.html">Accueil</a></li>
            <li><a href="distribution.html">Distribution</a></li>
                <li><a href="pricing.html">Tarifs</a></li>
                <li><a href="le-label/mmcp.html">Le label</a></li>



            </ul>
        </nav>
    </header>

<div class="auth-container">

  <div class="auth-card">

    <h1>Créer un compte</h1>
    <p class="subtitle">Rejoignez Morgann Music CP</p>

    <form id="registerForm">

      <input type="text" id="prenom" placeholder="Prénom" required>
      <input type="text" id="nom" placeholder="Nom" required>

      <input type="tel" id="phone" placeholder="Numéro de téléphone" required>

      <input type="text" id="artist" placeholder="Nom d’artiste" required>

      <input type="email" id="email" placeholder="Adresse email" required>

      <input type="password" id="password" placeholder="Mot de passe" required>

      <input type="password" id="confirm" placeholder="Confirmer le mot de passe" required>

      <button type="submit">Créer mon compte</button>

    </form>

    <p class="bottom-text">
      Déjà un compte ?
      <a href="login.html">Se connecter</a>
    </p>

    <div class="security">
      🔒 Données sécurisées
    </div>

  </div>

</div>

<script src="register.js"></script>

<script>
const logo = document.getElementById('logo-dynamique');

const logoClair = "logo.png";
const logoSombre = "logo2.png";

const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

function setLogoBasedOnScheme() {
    if (mediaQuery.matches) {
        logo.src = logoSombre;
    } else {
        logo.src = logoClair;
    }
}

setLogoBasedOnScheme();

mediaQuery.addEventListener('change', setLogoBasedOnScheme);
</script>


</body>
</html>
