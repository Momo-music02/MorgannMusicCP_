<h1>Demandes reçues</h1>
<table id="table"></table>

    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="styles-accueil.css">
    <link rel="stylesheet" href="comment-faire.css">
    <link rel="stylesheet" href="pied-de-page.css">



<script>
fetch("https://script.google.com/macros/s/AKfycbw4bH71jYtZqiD6TqilV-75snoZxcIBjQIvz_r7aeAFqF2_KSUTkWOlxFUZiSQwGdhY/exec")
  .then(r => r.json())
  .then(data => {
    const table = document.getElementById("table");
    data.forEach(row => {
      const tr = document.createElement("tr");
      row.forEach(cell => {
        const td = document.createElement("td");
        td.textContent = cell;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  });
</script>
