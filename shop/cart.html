<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panier - MMCP</title>
  <link rel="stylesheet" href="/shop/shop.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="shop-wrap">
    <header class="shop-head">
      <h1>Panier</h1>
      <p class="shop-muted">Ton panier est lié à ton compte Firebase.</p>
    </header>
    <p id="status" class="status">Chargement...</p>
    <section id="cartList" class="cart-list"></section>
    <div id="cartSummary" class="cart-summary" style="display:none;">
      <strong id="cartTotal">Total: 0 €</strong>
      <button id="payBtn" class="btn-buy">Payer</button>
    </div>
  </main>

  <script type="module" src="/shop/cart.js"></script>
</body>
</html>
