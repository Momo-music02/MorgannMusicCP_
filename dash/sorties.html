<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mes sorties — Morgann Music CP</title>
    <meta name="theme-color" content="#e2e2e2">
  <link rel="stylesheet" href="/assets/css/dash/artist-sidebar.css" />


  <meta name="theme-color" content="#7494ec" />

  <!-- CSS base (repris) + ajouts UI -->
  <style>
    :root {
      --bg: #e2e2e2;
      --txt: #000000;
      --cover: #868686;
      --bg2: #ffffff;
      --cover: #bfbfbf;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #414141;
        --txt: #ffffff;
        --cover: #2c2c2c;
        --bg2: #1e1e1e;
        --cover: #575757;
      }
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--txt);
      font-family: 'Helvetica', sans-serif;
    }

    .titre-page {
      color: var(--txt);
      padding: 30px;
      margin-top: 6px;
      text-align: center;
      font-size: 28pt;
    }
    @media (max-width: 768px) {
      .titre-page { font-size: 17pt; }
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 18px 40px;
    }

    .topbar{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill{
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.10);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      font-weight: 900;
      font-size: 11pt;
    }
    @media (prefers-color-scheme: dark){
      .pill{
        background: rgba(30,30,30,0.55);
        border: 1px solid rgba(255,255,255,0.12);
      }
    }

    .btn{
      display:inline-block;
      padding: 12px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--cover);
      color: var(--txt);
      font-weight: 900;
      text-decoration:none;
      text-align:center;
      white-space: nowrap;
    }

    .btn-outline{
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
    }
    @media (prefers-color-scheme: dark){
      .btn-outline{ border: 1px solid rgba(255,255,255,0.18); }
    }

    .btn-danger{
      background: transparent;
      border: 1px solid rgba(220,38,38,0.45);
      color: #dc2626;
    }

    .grid{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1000px){
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: rgba(255,255,255,0.55);
      border-radius: 26px;
      padding: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      overflow: hidden;
      position: relative;
    }
    @media (prefers-color-scheme: dark){
      .card{
        background: rgba(30,30,30,0.55);
        border: 1px solid rgba(255,255,255,0.10);
      }
    }

    .row{
      display:flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .title{
      font-weight: 900;
      font-size: 13pt;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      max-width: 100%;
    }

    .meta{
      margin-top: 8px;
      opacity: 0.8;
      font-size: 11pt;
    }

    .tags{
      margin-top: 10px;
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag{
      font-size: 10pt;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.06);
      opacity: 0.9;
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark){
      .tag{ background: rgba(255,255,255,0.08); }
    }

    .actions{
      margin-top: 14px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty{
      margin-top: 18px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.07);
      opacity: 0.85;
    }
    @media (prefers-color-scheme: dark){
      .empty{
        background: rgba(30,30,30,0.45);
        border: 1px solid rgba(255,255,255,0.10);
      }
    }

    .pied-de-page {
      width: 100%;
      height: 60px;
      text-align: center;
      font-size: 10pt;
      color: var(--txt);
      padding: 20px;
      background: var(--bg2);
      margin-top: 50px;
    }
  </style>
</head>

<body class="artist-sidebar-push">
  <script type="module" src="/assets/js/dash/artist-sidebar.js"></script>

  <h1 class="titre-page">Mes sorties</h1>

  <div class="wrap">
    <div class="topbar">
      <div class="left">
        <div class="pill" id="countPill">0 sortie</div>
        <div class="pill" id="userPill">—</div>
        <div class="pill" id="vipPill" style="display:none;">👑 VIP</div>
      </div>

      <div class="left">
        <!-- plus tard, on fera une vraie page new-release -->
        <a class="btn btn-outline" href="/dash/index.html">← Dashboard</a>
        <a class="btn" id="btnCreate" href="/dash/upload.html">Créer une sortie</a>
      </div>
    </div>

    <div id="emptyBox" class="empty" style="display:none;">
      Aucune sortie pour le moment.
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <footer class="pied-de-page">Morgann Music CP — Sorties</footer>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      orderBy,
      limit,
      getDocs,
      getDoc,
      deleteDoc,
      doc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSPUArpApBuK0Cn9VbeMtqk4JC-gqruJc",
      authDomain: "morgann-music-cp.firebaseapp.com",
      projectId: "morgann-music-cp",
      storageBucket: "morgann-music-cp.firebasestorage.app",
      messagingSenderId: "666812685196",
      appId: "1:666812685196:web:fe3df6749ae768d68494a9"
    };

    const toast = sessionStorage.getItem("toast");
if (toast) {
  sessionStorage.removeItem("toast");
  alert(toast);
}
    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    const grid = $("grid");
    const emptyBox = $("emptyBox");
    const countPill = $("countPill");
    const userPill = $("userPill");
    const vipPill = $("vipPill");
    const btnCreate = $("btnCreate");
    let canAccessAllReleases = false;
    let currentReleases = [];

    function isPayPerReleasePlanActive(){
      try {
        return clean(localStorage.getItem("mmcpSelectedPlan")).toLowerCase() === "pay-per-release";
      } catch {
        return false;
      }
    }

    function syncCreateReleaseLink(){
      if (!btnCreate) return;
      btnCreate.setAttribute("href", isPayPerReleasePlanActive() ? "/dash/upload.html?plan=pay-per-release" : "/dash/upload.html");
    }

    function clean(s){ return String(s || "").trim(); }

    function fmtDate(ts){
      try{
        const d = ts?.toDate ? ts.toDate() : null;
        if (!d) return "";
        return d.toLocaleDateString("fr-FR");
      }catch{ return ""; }
    }

    function parseReleaseDate(r){
      const raw = clean(r?.schedule?.releaseDate || r.releaseDate);
      if (!raw) return null;
      const d = new Date(raw + "T00:00:00");
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function countdownText(r){
      const date = parseReleaseDate(r);
      if (!date) return "Date de sortie non définie";
      const diff = date.getTime() - Date.now();
      if (diff <= 0) return "Sortie publiée ou en cours";
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      return `J-${days} (${hours}h)`;
    }

    function isVipUserData(data){
      if (!data || typeof data !== "object") return false;
      const role = clean(data.role).toLowerCase();
      const status = clean(data.status).toLowerCase();
      const plan = clean(data.plan).toLowerCase();
      const accountType = clean(data.accountType).toLowerCase();
      const subscription = clean(data.subscription).toLowerCase();
      return (
        data.vip === true ||
        data.isVip === true ||
        role === "vip" ||
        status === "vip" ||
        plan === "vip" ||
        accountType === "vip" ||
        subscription === "vip"
      );
    }

    async function getUserProfileData(user){
      if (!user) return null;

      try {
        const byUid = await getDoc(doc(db, "users", user.uid));
        if (byUid.exists()) return byUid.data();
      } catch (e) {
        console.warn("users/{uid} inaccessible:", e);
      }

      if (user.email) {
        try {
          const byEmailQ = query(collection(db, "users"), where("email", "==", user.email), limit(1));
          const byEmail = await getDocs(byEmailQ);
          if (!byEmail.empty) return byEmail.docs[0].data();
        } catch (e) {
          console.warn("users by email inaccessible:", e);
        }
      }

      return null;
    }

    async function loadReleases(uid, includeAll=false){
      try{
        if (includeAll){
          const all = [];
          try{
            const qAll = query(
              collection(db, "releases"),
              orderBy("createdAt", "desc"),
              limit(300)
            );
            const snapAll = await getDocs(qAll);
            snapAll.forEach(d => all.push({ id: d.id, ...d.data() }));
          }catch(e){
            console.warn("loadReleases: full access ordered query failed, fallback simple query", e);
            try {
              const qAllFallback = query(collection(db, "releases"), limit(300));
              const snapAllFallback = await getDocs(qAllFallback);
              snapAllFallback.forEach(d => all.push({ id: d.id, ...d.data() }));
            } catch (e2) {
              console.warn("loadReleases: full access fallback failed", e2);
            }
          }

          // Garantit que les releases du user courant sont présentes même en mode VIP.
          try {
            const qMine = query(
              collection(db, "releases"),
              where("ownerUid", "==", uid),
              orderBy("createdAt", "desc"),
              limit(150)
            );
            const snapMine = await getDocs(qMine);
            snapMine.forEach(d => all.push({ id: d.id, ...d.data() }));
          } catch (e) {
            console.warn("loadReleases: include owner query failed in VIP mode", e);
            try {
              const qMineFallback = query(
                collection(db, "releases"),
                where("ownerUid", "==", uid),
                limit(200)
              );
              const snapMineFallback = await getDocs(qMineFallback);
              snapMineFallback.forEach(d => all.push({ id: d.id, ...d.data() }));
            } catch (e2) {
              console.warn("loadReleases: include owner fallback query failed in VIP mode", e2);
            }
          }

          const byId = {};
          all.forEach(r => { byId[r.id] = r; });
          const uniq = Object.values(byId);

          uniq.sort((a,b) => {
            const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
            const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
            return tb - ta;
          });

          // Sécurité: si les requêtes VIP retournent vide (règles/permissions/index),
          // on retombe sur le chargement standard pour au moins afficher les sorties du compte.
          if (!uniq.length) {
            return await loadReleases(uid, false);
          }

          return uniq;
        }

        // récupérer artist ids de l'utilisateur
        const artistIds = [];
        try{
          const qA = query(collection(db, "artists"), where("ownerUid", "==", uid));
          const snapA = await getDocs(qA);
          snapA.forEach(d => artistIds.push(d.id));
        }catch(e){ /* silent */ }

        const docs = [];

        // releases où ownerUid == uid
        try{
          const q1 = query(
            collection(db, "releases"),
            where("ownerUid", "==", uid),
            orderBy("createdAt", "desc"),
            limit(50)
          );
          const s1 = await getDocs(q1);
          s1.forEach(d => docs.push({ id: d.id, ...d.data() }));
        }catch(e){
          console.warn("loadReleases: ordered ownerUid query failed, fallback simple query", e);
          try {
            const q1b = query(collection(db, "releases"), where("ownerUid", "==", uid), limit(100));
            const s1b = await getDocs(q1b);
            s1b.forEach(d => docs.push({ id: d.id, ...d.data() }));
          } catch (e2) {
            console.warn("loadReleases: fallback ownerUid query failed", e2);
          }
        }

        // releases liées aux artistes
        if (artistIds.length){
          for (let i = 0; i < artistIds.length; i += 10){
            const chunk = artistIds.slice(i, i + 10);
            try{
              const q2 = query(collection(db, "releases"), where("mainArtistId", "in", chunk), limit(50));
              const s2 = await getDocs(q2);
              s2.forEach(d => docs.push({ id: d.id, ...d.data() }));
            }catch(e){ /* silent */ }
            try{
              const q3 = query(collection(db, "releases"), where("artistId", "in", chunk), limit(50));
              const s3 = await getDocs(q3);
              s3.forEach(d => docs.push({ id: d.id, ...d.data() }));
            }catch(e){ console.warn("loadReleases: artistId query failed", e); }
          }
        }
        // dédoublonner et trier
        const byId = {};
        docs.forEach(r => { byId[r.id] = r; });
        const uniq = Object.values(byId);
        uniq.sort((a,b) => {
          const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
          const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
          return tb - ta;
        });

        console.debug("loadReleases: merged count=", uniq.length, "ownerCount(approx)=", docs.length);
        return uniq;
      }catch(e){
        console.warn("loadReleases:", e);
        return [];
      }
    }

    function render(list){
      currentReleases = Array.isArray(list) ? list : [];
      grid.innerHTML = "";

      countPill.textContent = list.length + (list.length > 1 ? " sorties" : " sortie");

      if (!list.length){
        emptyBox.style.display = "block";
        return;
      }
      emptyBox.style.display = "none";

      for (const r of list){
        const title = clean(r.title) || "Release";
        const artist = clean(r.artistName) || "—";
        const type = clean(r.type) || "—";
        const status = clean(r.statusUser) || "—";
        const date = clean(r?.schedule?.releaseDate || r.releaseDate) || fmtDate(r.createdAt);
        const countdown = countdownText(r);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="row">
            <div style="min-width:0;">
              <div class="title">${title}</div>
              <div class="meta">${artist}${date ? " • " + date : ""}</div>
            </div>
            <div class="tag">${status}</div>
          </div>

          <div class="tags">
            <div class="tag">${type}</div>
            <div class="tag">${countdown}</div>
            ${r.test === true ? `<div class="tag">TEST</div>` : ``}
          </div>

          <div class="actions">
            <a class="btn btn-outline" href="/dash/release.html?id=${encodeURIComponent(r.id)}">Ouvrir</a>
            <a class="btn btn-outline" href="/dash/edit-release.html?id=${encodeURIComponent(r.id)}">Modifier</a>
            <button class="btn btn-danger" data-del="${r.id}">Supprimer</button>
          </div>
        `;

        // delete
        card.querySelector("[data-del]")?.addEventListener("click", async () => {
          const ok = confirm("Supprimer cette sortie ?");
          if (!ok) return;
          try{
            await deleteDoc(doc(db, "releases", r.id));
            const fresh = await loadReleases(auth.currentUser.uid, canAccessAllReleases);
            render(fresh);
          }catch(e){
            alert(e?.message || String(e));
          }
        });

        grid.appendChild(card);
      }
    }

    // Guard + init
    onAuthStateChanged(auth, async (user) => {
      if (!user){
        const here = window.location.href;
        window.location.href = "/login.html?redirect=" + encodeURIComponent(here);
        return;
      }

      syncCreateReleaseLink();

      userPill.textContent = user.email || "Connecté";

      const userData = await getUserProfileData(user);
      canAccessAllReleases = isVipUserData(userData);

      if (canAccessAllReleases) {
        vipPill.style.display = "inline-block";
        vipPill.textContent = "👑 VIP — accès complet";
      } else {
        vipPill.style.display = "none";
      }

      const list = await loadReleases(user.uid, canAccessAllReleases);
      render(list);
    });

      // ====== CONFIG COULEURS ======
const THEME_LIGHT_TOP = "#e2e2e2"; // haut de page en mode clair
const THEME_DARK_TOP  = "#414141"; // haut de page en mode sombre
const THEME_SCROLLED  = "#000000"; // quand tu scroll (navbar noire)

const SCROLL_THRESHOLD = 50;

// ====== RÉCUP META THEME-COLOR (ou crée si absent) ======
let themeMeta = document.querySelector('meta[name="theme-color"]');

if (!themeMeta) {
  themeMeta = document.createElement("meta");
  themeMeta.setAttribute("name", "theme-color");
  document.head.appendChild(themeMeta);
}

// ====== DÉTECTER LE MODE SOMBRE SYSTÈME ======
const darkModeQuery = window.matchMedia("(prefers-color-scheme: dark)");

function updateThemeColor() {
  const isDark = darkModeQuery.matches;
  const isScrolled = window.scrollY > SCROLL_THRESHOLD;

  if (isScrolled) {
    themeMeta.setAttribute("content", THEME_SCROLLED);
  } else {
    themeMeta.setAttribute("content", isDark ? THEME_DARK_TOP : THEME_LIGHT_TOP);
  }
}

// Scroll -> change couleur
window.addEventListener("scroll", updateThemeColor, { passive: true });

// Changement mode sombre iOS/macOS -> change couleur
if (typeof darkModeQuery.addEventListener === "function") {
  darkModeQuery.addEventListener("change", updateThemeColor);
} else {
  // vieux Safari
  darkModeQuery.addListener(updateThemeColor);
}

// Initialisation au chargement
updateThemeColor();

  </script>
</body>
</html>
